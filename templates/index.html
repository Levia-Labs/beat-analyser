<!doctype html>
<html>
  <head>
    <title>Beat Extractor</title>
  </head>
  <body>
    <h2>Upload MP3</h2>
    <form action="/upload" method="post" enctype="multipart/form-data">
      <input type="file" name="file" accept=".mp3,.wav" required />
      <button type="submit">Process</button>
    </form>
  </body>
</html>

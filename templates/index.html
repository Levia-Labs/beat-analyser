<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Drum Transcription</title>
    <!-- Bootstrap CSS from Google CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <div class="container py-5">
      <h1 class="text-center mb-4">Upload MP3/WAV for Drum Transcription</h1>
      <div class="row justify-content-center">
        <div class="col-md-6">
          <form
            action="/upload"
            method="post"
            enctype="multipart/form-data"
            class="card p-4 shadow-sm bg-white rounded"
          >
            <div class="mb-3">
              <label for="file" class="form-label">Select file</label>
              <input
                class="form-control"
                type="file"
                id="file"
                name="file"
                accept=".wav,.mp3"
                required
              />
            </div>
            <div class="text-center">
              <button type="submit" class="btn btn-primary">
                Upload & Transcribe
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS Bundle from Google CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Drum Transcription</title>
  </head>
  <body>
    <h1>Upload MP3/WAV for Drum Transcription</h1>
    <form action="/upload" method="post" enctype="multipart/form-data">
      <input type="file" name="file" accept=".wav,.mp3" required />
      <button type="submit">Upload & Transcribe</button>
    </form>
  </body>
</html>

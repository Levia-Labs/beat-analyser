<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Beat Analyzer</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #121212;
        color: #e0e0e0;
      }
      .card {
        background-color: #1e1e1e;
        color: #e0e0e0;
      }
      .accordion-button {
        background-color: #72246b;
        border-color: #72246b;
        color: #e0e0e0;
      }
      .accordion-button:not(.collapsed) {
        background-color: #72246b;
        color: #ffffff;
      }
      .accordion-button::after {
        filter: invert(1); /* Makes arrow white */
      }
      .accordion-item {
        border: var(--bs-accordion-border-width) solid hsl(0, 0%, 70%);
      }
      .list-group-item {
        background-color: #1e1e1e;
        color: #e0e0e0;
      }
      .btn-process {
        background-color: #72246b;
        border-color: #72246b;
        color: #e0e0e0;
      }
      .btn-process:hover,
      .btn-process:focus {
        background-color: #72246b;
        border-color: #72246b;
        color: #e0e0e0;
      }
      .btn-download {
        background-color: #72246b;
        border-color: #72246b;
        color: #e0e0e0;
      }
      .btn-download:hover,
      .btn-download:focus {
        background-color: #72246b;
        border-color: #72246b;
        color: #e0e0e0;
      }
      .modal-content {
        background-color: #1e1e1e;
        color: #e0e0e0;
      }
      pre {
        background-color: #2a2a2a;
        color: #e0e0e0;
      }
      input.form-control {
        background-color: #2a2a2a;
        color: #e0e0e0;
        border-color: #444;
      }
      .container {
        width: 100%;
        max-width: 100%;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div
      class="container"
      style="width: 100%; display: flex; justify-content: center"
    >
      <div
        class="container"
        style="
          width: 100%;
          max-width: 800px;
          display: flex;
          justify-content: center;
          flex-direction: column;
        "
    >
      <h1 class="text-center mb-4 mt-4">Beat Analyzer</h1>

      <!-- Upload Form -->
      <div class="row justify-content-center mb-5">
          <div class="col-md-6 container">
          <form
            id="uploadForm"
            action="/upload"
            method="post"
            enctype="multipart/form-data"
            class="card p-4 shadow-sm rounded"
          >
            <div class="mb-3">
              <label for="file" class="form-label">Select file</label>
              <input
                class="form-control"
                type="file"
                id="file"
                name="file"
                accept=".wav,.mp3"
                required
              />
            </div>
            <div class="text-center">
              <button type="submit" class="btn btn-process" id="uploadBtn">
                Process file
              </button>
            </div>
          </form>
        </div>
      </div>

      <!-- Folders Accordion -->
      <div class="row justify-content-center mb-5">
        <div class="col-12">
          <h2 class="mb-3 text-center">Results</h2>
          <div class="accordion" id="foldersAccordion"></div>
        </div>
      </div>
    </div>

    <!-- Loading Modal -->
    <div class="modal fade" id="loadingModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content text-center p-3">
          <div class="modal-body">
            <p>Processing file, please wait...</p>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      async function loadFolders() {
        const response = await fetch("/folders");
        const data = await response.json();
        const accordion = document.getElementById("foldersAccordion");
        accordion.innerHTML = "";

        Object.keys(data).forEach((folder, index) => {
          const folderId = `folder-${index}`;
          const collapseId = `collapse-${index}`;

          let filesHtml = '<ul class="list-group list-group-flush">';
          Object.entries(data[folder]).forEach(([fname, info]) => {
            if (info.content) {
              filesHtml += `<li class="list-group-item">
                <strong>${fname}</strong> (size: ${(info.size / 1024).toFixed(2)} KB)
                <pre>${JSON.stringify(info.content, null, 2)}</pre>
              </li>`;
            } else {
              filesHtml += `<li class="list-group-item">
                <strong>${fname}</strong> (size: ${(info.size / 1024).toFixed(2)} KB)
              </li>`;
            }
          });
          filesHtml += "</ul>";

          const itemHtml = `
            <div class="accordion-item">
              <h2 class="accordion-header" id="${folderId}">
                <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#${collapseId}" aria-expanded="false" aria-controls="${collapseId}">
                  ${folder}
                </button>
              </h2>
              <div id="${collapseId}" class="accordion-collapse collapse" aria-labelledby="${folderId}" data-bs-parent="#foldersAccordion">
                <div class="accordion-body p-0">
                  ${filesHtml}
                  <div class="text-center p-2" style="background-color: #1e1e1e;">
                    <a href="/download/${folder}" class="btn btn-download btn-sm">Download ZIP</a>
                  </div>
                </div>
              </div>
            </div>
          `;
          accordion.insertAdjacentHTML("beforeend", itemHtml);
        });
      }

      const uploadForm = document.getElementById("uploadForm");
      uploadForm.addEventListener("submit", function () {
        const modal = new bootstrap.Modal(
          document.getElementById("loadingModal"),
        );
        modal.show();
      });

      window.addEventListener("DOMContentLoaded", loadFolders);
    </script>
  </body>
</html>
